<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple carousel · example</title>
    <style>
        /* just the basics — no extra decorations */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #3a3a3a;
            font-family: 'Times New Roman', Times, serif, Helvetica, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1rem;
        }

        .card {
            max-width: 700px;
            width: 100%;
            background: rgb(140, 0, 0);
            border-radius: 2rem;
            padding: 2rem 1.5rem 2.5rem 1.5rem;
            box-shadow: 0 15px 30px #be7575;
            text-align: center;
        
        }

        h2 {
            color: #522121;
            margin-bottom: 1.8rem;
            font-weight: 500;
            font-size: 2rem;
            
        }

        /* ---------- SIMPLE CAROUSEL ---------- */
        .carousel {
            display: flex;
            overflow-x: auto;
            gap: 1.2rem;
            scroll-snap-type: x mandatory;
            padding: 0.5rem 0.2rem 1.5rem 0.2rem;
            /* hide scrollbar if you want cleaner look (optional) */
            scrollbar-width: thin;
            scrollbar-color: #cd6c6c #ffd9d9;
        }

        /* for Chrome/Safari */
        .carousel::-webkit-scrollbar {
            height: 8px;
        }
        .carousel::-webkit-scrollbar-track {
            background: #ff7575;
            border-radius: 20px;
        }
        .carousel::-webkit-scrollbar-thumb {
            background: #6e2121;
            border-radius: 20px;
        }

        .carousel-item {
            scroll-snap-align: start;
            flex: 0 0 auto;
            width: 220px;
            height: 150px;
            background: #b56262;
            border-radius: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: white;
            font-weight: bold;
            box-shadow: 0 8px 12px #cf8787;
            border: 3px solid white;
        }

        /* make images fit (if you use real images) */
        .carousel-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 1.4rem;
        }

        .note {
            margin-top: 1.8rem;
            color: #773939;
            background: #ffe5e5;
            padding: 0.8rem 1.2rem;
            border-radius: 3rem;
            font-size: 1rem;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>GOATED ALBUMS</h2>

        <!-- === CAROUSEL (only HTML + CSS) === -->
        <div class="carousel">
            <!-- slide 1 (using colored divs with emoji – you can replace with <img> ) -->
            <div class="carousel-item" id="slide1"></div>
                <img src = "C" >
            <div class="carousel-item" id="slide2"></div>
            <div class="carousel-item" id="slide3"></div>
            <div class="carousel-item" id="slide4"></div>
            <div class="carousel-item" id="slide5"></div>
            <div class="carousel-item" id="slide6"></div>
        </div>

        <div class="note">
            ⬅️ swipe / drag →  ·  snap enabled  ·  pure CSS
        </div>

        <!-- short explanation -->
        <p style="margin-top: 1.5rem; color:#662d2d; background:#ffecec; padding:0.6rem; border-radius:3rem;">
            ✔️ <code>display: flex</code> + <code>overflow-x: auto</code> + <code>scroll-snap-type</code>
        </p>
    </div>
</body>
</html>
